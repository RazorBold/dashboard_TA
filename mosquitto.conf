# mosquitto.conf — Konfigurasi Mosquitto MQTT Broker
# Letakkan di VM bersama app.py
#
# Install Mosquitto di Ubuntu/Debian VM:
#   sudo apt update && sudo apt install -y mosquitto mosquitto-clients
#   sudo cp mosquitto.conf /etc/mosquitto/conf.d/ble-monitor.conf
#   sudo systemctl restart mosquitto
#   sudo systemctl enable  mosquitto

# ─── Listener ─────────────────────────────────────────────────────────────────
listener 1883 0.0.0.0        # terima koneksi dari semua interface (Pi dari luar)

# ─── Akses (tanpa auth — untuk development/testing) ───────────────────────────
allow_anonymous true

# ─── Logging ──────────────────────────────────────────────────────────────────
log_dest file /var/log/mosquitto/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# ─── Persistence (pesan tidak hilang saat broker restart) ────────────────────
persistence true
persistence_location /var/lib/mosquitto/

# ─── Limit koneksi ────────────────────────────────────────────────────────────
max_connections 50
